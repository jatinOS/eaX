# eaX OS System Config file
# Config file for eaX operating system

[system]
name = eaX OS
version = 1.0.0
codename = Fortress
build = 20260510
architecture = x86_64
kernel = eax_kernel.bin
bootloader = boot.bin
initrd = initrd.img

[memory]
kernel_base = 0x100000
heap_start = 0x200000
heap_end = 0x800000
page_size = 4096
max_processes = 256
stack_size = 8192
kernel_stack = 0x200000

[display]
resolution = 1920x1080
color_depth = 32
refresh_rate = 60
vga_mode = 0x118
framebuffer = 0xA0000
gpu_vendor = eaX
gpu_memory = 164MB
compatibility = Intel, AMD, Apple, Virtual Machines
cursor_blink = true
cursor_shape = underscore

[security]
level = FORTRESS
ai_enabled = true
malware_scan = true
dll_protection = true
exe_protection = true
bin_protection = true
file_monitoring = true
network_monitoring = false
auto_quarantine = true
scan_on_boot = true
scan_on_access = true
quarantine_path = /system/quarantine
log_path = /var/log/security.log

# AI Security Settings
ai_max_code_lines = 7000
ai_message_limit_coding = 4
ai_message_limit_security = 8
ai_message_limit_general = 6000
ai_safe_mode = true
ai_virus_detection = true

[filesystem]
type = eaXFS
root_device = /dev/sda1
mount_point = /
journaling = true
compression = false
encryption = false
max_open_files = 256
cache_size = 1048576

# driveconfig
drives = C:, A:, B:
c_drive_type = primary
c_drive_size = 189GB
c_drive_fs = eaXFS
c_drive_mount = /
a_drive_type = removable
a_drive_size = 1.44MB
a_drive_fs = FAT12
a_drive_mount = /mnt/a
b_drive_type = removable
b_drive_size = variable
b_drive_fs = eaXFS
b_drive_mount = /downloads

[process]
scheduler = round_robin
time_slice = 10
max_priority = 99
min_priority = 0
default_priority = 50
preemptive = true
multitasking = true

[interrupts]
pic_master = 0x20
pic_slave = 0xA0
timer_irq = 0
keyboard_irq = 1
mouse_irq = 12
disk_irq = 14
rtc_irq = 8

[devices]
keyboard = /dev/input/keyboard
mouse = /dev/input/mouse
disk = /dev/sda
rtc = /dev/rtc
console = /dev/console
null = /dev/null
zero = /dev/zero
random = /dev/random

# ============================================
# NETWORK CONFIGURATION
# ============================================
[network]
enabled = true
hostname = eax-pc
domain = local
dhcp = true
dns_servers = 8.8.8.8, 8.8.4.4
wifi_enabled = true
wifi_default_ssid = eaX-Guest
wifi_location = Global
wifi_region = Worldwide

[users]
default_user = admin
default_group = users
home_directory = /home
shell = /bin/shell.py
max_users = 64

[applications]
terminal = /bin/terminal
notepad = /bin/notepad
file_manager = /bin/explorer
task_manager = /bin/taskmgr
settings = /bin/settings
hex_editor = /bin/hexedit
browser = /bin/chrome
game_tictactoe = /bin/tictactoe

[languages]
fortran = true
cobol = true
asm = true
c = true
h = true
cpp = true
d = true
m = true
python = true
javascript = false
rust = false

#cp
fortran_compiler = /bin/gfortran
cobol_compiler = /bin/cobc
asm_compiler = /bin/nasm
c_compiler = /bin/gcc
cpp_compiler = /bin/g++
d_compiler = /bin/gdc
m_compiler = /bin/gm2
python_interpreter = /bin/python

[boot]
timeout = 5
default_os = eaX
boot_message = Welcome to eaX OS
show_menu = false
quiet_boot = false
debug_boot = false
splash_screen = true
[logging]
enabled = true
level = INFO
log_file = /var/log/system.log
max_size = 10485760
rotate = true
max_files = 10

security_log = /var/log/security.log
kernel_log = /var/log/kernel.log
app_log = /var/log/applications.log

[performance]
gaming_mode = true
fps_optimization = true
gpu_acceleration = true
memory_optimization = true
disk_caching = true
io_priority = high
cpu_governor = performance

[power]
battery_monitoring = true
low_battery_threshold = 15
critical_battery_threshold = 5
suspend_on_lid_close = true
hibernate_on_low_battery = true
ac_power_behavior = performance
battery_power_behavior = balanced

[ui]
theme = eaX_dark
accent_color = #00D4FF
background_color = #0F0C29
font_family = Segoe UI
font_size = 14
icon_size = 48
animation_enabled = true
transparency = true
blur_effect = true
